site_name: GPUMDkit Tutorial
site_description: Tutorials for GPUMDkit.
site_author: Zihan YAN
site_url: https://zhyan0603.github.io/GPUMDkit
repo_name: zhyan0603/GPUMDkit
repo_url: https://github.com/zhyan0603/GPUMDkit

theme:
  name: material
  language: en  # English interface
  palette:
    primary: '#3498db'  # Main color
    accent: light_blue  # Link/button color
  font:
    text: Roboto
    code: JetBrains Mono
  features:
    - content.code.copy  # Copy button for code blocks
    - navigation.top  # Back-to-top button
    - search.suggest  # Search suggestions
    - search.highlight  # Highlight search terms
  icon:
    admonition:
      note: octicons/tag-16
      abstract: octicons/checklist-16
      info: octicons/info-16
      tip: octicons/squirrel-16
      success: octicons/check-16
      question: octicons/question-16
      warning: octicons/alert-16
      failure: octicons/x-circle-16
      danger: octicons/zap-16
      bug: octicons/bug-16
      example: octicons/beaker-16
      quote: octicons/quote-16

docs_dir: tutorials
site_dir: htmls  # Output HTML to docs/
use_directory_urls: false

markdown_extensions:
  - admonition
  - attr_list
  - pymdownx.details
  - pymdownx.highlight:  # Code highlighting
      anchor_linenums: true
  - pymdownx.superfences  # Advanced code blocks
  - tables  # Markdown tables
  - md_in_html  # Allow HTML in Markdown

plugins:
  - search:  # Enable search
      lang: en

nav:
  - Home: index.md
  - English:
    - GPUMDkit Tutorials: en/index.md
    - Quick Start: en/quick_start.md
    - Command Reference: en/command_reference.md
    - Format Conversion: en/format_conversion.md
    - Structure Sampling: en/structure_sampling.md
    - Workflow Scripts: en/workflow_scripts.md
    - Calculator Scripts: en/calculator_scripts.md
    - Analyzer Scripts: en/analyzer_scripts.md
    - Plot Scripts: en/plot_scripts.md
    - Custom Commands: en/custom_commands.md
    - Active Learning Workflow: en/active_learning_workflow.md
    - Polar Material Analysis: en/polar_material_analysis.md
    - Contributing to GPUMDkit: en/contributing_to_gpumdkit.md
  - 简体中文:
    - GPUMDkit 教程: zh/index.md
    - 快速入门: zh/快速入门.md
    - 命令参考: zh/命令参考.md
    - 格式转换: zh/格式转换.md
    - 结构采样: zh/结构采样.md
    - 工作流脚本: zh/工作流脚本.md
    - 计算器脚本: zh/计算器脚本.md
    - 分析工具: zh/分析工具.md
    - 绘图脚本: zh/绘图脚本.md
    - 自定义命令: zh/自定义命令.md
    - 主动学习工作流: zh/主动学习工作流.md
    - 极性材料分析: zh/极性材料分析.md
    - 贡献指南: zh/贡献指南.md

